# ************************************************************************
# Configuracion SOLO para pruebas (src/test/resources).
# Resuelve los placeholders (JWT/OAuth) con valores dummy para que
# @SpringBootTest pueda levantar el contexto sin variables de entorno.
# NO usar en PR
# Este archivo "sombrea" al application.properties principal durante los
# tests, por eso tambien re-declara el datasource local.
# ************************************************************************

spring.application.name=skillbridge_backend

# PostgreSQL local (parametrizable; por defecto el Postgres local)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/skill_bridge}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}

# JPA / Hibernate (dialecto de PostgreSQL autodetectado)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT secreto dummy para test (base64, y 32 bytes al decodificar)
security.jwt.secret-key=ZHVtbXktdGVzdC1zZWNyZXQta2V5LWZvci1qdW5pdC1hdC1sZWFzdC0zMi1ieXRlcw==
security.jwt.access-token-expiration=900000
security.jwt.refresh-token-expiration-days=7

# OAuth2 Google — valores dummy para test
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile,openid
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://openidconnect.googleapis.com/v1/userinfo
spring.security.oauth2.client.provider.google.jwk-set-uri=https://www.googleapis.com/oauth2/v3/certs
spring.security.oauth2.client.provider.google.user-name-attribute=sub
