# Spring Boot Application
spring.application.name=skillbridge_backend
server.port=8083

# MySQL DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/skill_bridge
spring.datasource.username=root
spring.datasource.password=admin

# JPA / Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
#Para crear la tabla desde springboot= update... de lo contrario= none
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#Mostrar en formato sql 
spring.jpa.properties.hibernate.format_sql=true

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile,openid
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://openidconnect.googleapis.com/v1/userinfo
spring.security.oauth2.client.provider.google.jwk-set-uri=https://www.googleapis.com/oauth2/v3/certs
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# JWT Security
security.jwt.secret-key=${JWT_SECRET_KEY}
security.jwt.access-token-expiration=900000
security.jwt.refresh-token-expiration-days=7

# Subida de archivos (avatares) — alineado con la validación de 5 MB del servicio.
# Sin esto aplica el límite por defecto de Spring (1 MB) y las imágenes > 1 MB fallan.
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB 