# Spring Boot Application
spring.application.name=skillbridge_backend
# El puerto lo inyecta la plataforma (Render/Railway) por la variable PORT;
# en local cae a 8083 por defecto.
server.port=${PORT:8083}

# PostgreSQL DataSource (parametrizado por variables de entorno; los valores
# por defecto apuntan a un Postgres local 
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/skill_bridge}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}

# JPA / Hibernate
# Hibernate detecta el dialecto de PostgreSQL automaticamente desde la conexion;
# no es necesario fijarlo manualmente.
#Para crear la tabla desde springboot= update... de lo contrario= none
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#Mostrar en formato sql
spring.jpa.properties.hibernate.format_sql=true

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile,openid
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://openidconnect.googleapis.com/v1/userinfo
spring.security.oauth2.client.provider.google.jwk-set-uri=https://www.googleapis.com/oauth2/v3/certs
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# JWT Security
security.jwt.secret-key=${JWT_SECRET_KEY}
security.jwt.access-token-expiration=900000
security.jwt.refresh-token-expiration-days=7

# Subida de archivos (avatares) — alineado con la validacion de 5 MB del servicio.
# Sin esto aplica el limite por defecto de Spring (1 MB) y las imagenes > 1 MB fallan.
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB 